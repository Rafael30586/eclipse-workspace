version: "3.8"
services:
  app:
    container_name: "sbcontainer"
    build: .
    ports: 
      - "8080:8080"
    environment: 
      - DATABASE_URL=jdbc:mysql://parajpa4:3306/negocio
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=123456
    depends_on: 
      - paracompose 
  paracompose:
    container_name: "parajpa4" 
    image: "mysql:8.3.0"
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "negocio"
volumes:
  mysql-data:           
